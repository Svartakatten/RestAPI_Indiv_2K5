name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Steg 1: Kompilera och verifiera koden
  build-and-test:
    runs-on: ubuntu-latest

    # Definiera externa tjänster som krävs under testfasen
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      vault:
        image: hashicorp/vault
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: my-root-token
        options: --cap-add=IPC_LOCK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Initiera Vault med de nycklar som applikationen förväntar sig vid uppstart
      - name: Initialize Vault Secrets
        run: |
          curl --header "X-Vault-Token: my-root-token" \
               --request POST \
               --data '{"data": {"test.password": "MySuperSecretVaultPassword123!"}}' \
               http://127.0.0.1:8200/v1/secret/data/application/restapi_indiv_1k4

      # Kör tester med miljövariabler pekandes mot GitHub Actions localhost
      - name: Run unit tests
        env:
          VAULT_TOKEN: "my-root-token"
          SPRING_CLOUD_VAULT_URI: "http://localhost:8200"
          SPRING_DATA_REDIS_HOST: "localhost"
        run: mvn test

  # Steg 2: Bygg Docker-image, pusha till Docker Hub och distribuera
  publish-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Vi kör bara detta jobb vid faktiska push-händelser till main (inte vid pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Steg 1: Logga in på Docker Hub med hjälp av GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Steg 2: Bygg applikationen och paketera i Docker-imagen via officiella Actions
      # Denna action sköter både "docker build" och "docker push" automatiskt.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/restapi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/restapi:${{ github.sha }}

      # Steg 3: Automatiserat deployment-steg utan .env-fil
      - name: Deploy application
        run: |
          # 1. Autentisera servern mot Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # 2. Skicka in variabeln direkt i kommandot för att uppdatera och starta
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker-compose pull
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker-compose up -d